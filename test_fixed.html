<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title> WebRTC 多人会议 </title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; margin: 0; color: #eee; display: flex; flex-direction: column; height: 100vh; }
        header { background: #2d2d2d; padding: 15px 20px; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; }
        .main-workspace { display: flex; flex: 1; overflow: hidden; }
        
        .video-grid { flex: 3; display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; gap: 15px; padding: 20px; overflow-y: auto; background: #121212; }
        .video-container { position: relative; background: #000; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: calc(50% - 15px); min-width: 300px; aspect-ratio: 16/9; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; transform: rotateY(180deg); }
        
        .video-mask { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #252526; display: none; align-items: center; justify-content: center; 
            z-index: 5; flex-direction: column; color: #888;
        }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; z-index: 10; }

        .sidebar { flex: 1; min-width: 320px; max-width: 400px; background: #252526; display: flex; flex-direction: column; border-left: 1px solid #3e3e42; }
        .control-panel { padding: 20px; border-bottom: 1px solid #3e3e42; }
        .log-area { flex: 1; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; color: #aaa; overflow-y: auto; background: #1e1e1e; }
        
        input { padding: 8px 12px; border: 1px solid #3e3e42; border-radius: 4px; background: #3c3c3c; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #0e639c; color: white; width: 100%; margin-bottom: 5px; }
        button:disabled { background: #4d4d4d; color: #888; cursor: not-allowed; }
        .btn-danger { background: #c53131; }
        .btn-success { background: #238636; }
        .flex-row { display: flex; gap: 8px; }
        .section-title { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 18px;">WebRTC 多人会议系统</div>
    <span id="connStatus" style="color: #c53131; font-size: 13px;">🔴 离线</span>
</header>

<div class="main-workspace">
    <div class="video-grid" id="videoGrid"></div>
    <div class="sidebar">
        <div class="control-panel">
            <div class="section-title">1. 用户注册</div>
            <div class="flex-row">
                <input type="text" id="userId" placeholder="输入 ID">
                <button id="btnConnect" onclick="connectServer()">注册</button>
            </div>
            
            <div class="section-title">2. 房间管理</div>
            <input type="text" id="roomId" placeholder="房间号">
            <div class="flex-row">
                <button id="btnCreate" onclick="createRoom()" disabled>创建房间</button>
                <button id="btnJoin" onclick="joinRoom()" disabled>加入房间</button>
                <button id="btnLeave" onclick="leaveRoom()" class="btn-danger" disabled>离开</button>
            </div>

            <div class="section-title">3. 媒体控制</div>
            <div class="flex-row">
                <button id="btnCamera" onclick="toggleCamera()" class="btn-success">开启摄像头</button>
                <button id="btnMic" onclick="toggleMic()" class="btn-success">开启麦克风</button>
            </div>
        </div>
        <div class="log-area" id="logBox"></div>
    </div>
</div>

<script>
    let ws = null, myId = "", currentRoom = "";
    let localStream = new MediaStream();
    let isVideoEnabled = false, isAudioEnabled = false;
    let blackVideoTrack = null;

    const peerConnections = new Map();
    const pendingCandidates = new Map();
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function log(msg, color = "#ccc") {
        const box = document.getElementById('logBox');
        box.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function sendJson(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

    // ================== 1. 信令连接 ==================
    function connectServer() {
        myId = document.getElementById('userId').value.trim();
        if (!myId) return alert("请输入 ID");

        ws = new WebSocket("ws://114.132.52.242:8080");
        ws.onopen = () => {
            log("信令服务器连接成功", "#2ea043");
            sendJson({ type: "register", session_id: myId });
        };

        ws.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            switch (data.type) {
                case "register_success":
                    log(`注册成功: ${data.session_id}`);
                    document.getElementById('connStatus').innerHTML = "🟢 在线: " + myId;
                    document.getElementById('connStatus').style.color = "#2ea043";
                    document.getElementById('btnConnect').disabled = true;
                    document.getElementById('btnCreate').disabled = false;
                    document.getElementById('btnJoin').disabled = false;
                    addVideoElement(myId, localStream, "我 (本地)");
                    break;
                case "create_room_success":
                case "join_room_success":
                    currentRoom = data.room_id;
                    log(`进入房间: ${currentRoom}`, "#58a6ff");
                    document.getElementById('btnCreate').disabled = true;
                    document.getElementById('btnJoin').disabled = true;
                    document.getElementById('btnLeave').disabled = false;
                    break;
                case "user_joined":
                    log(`用户 [${data.session_id}] 加入`);
                    addVideoElement(data.session_id, null, data.session_id);
                    initiateCall(data.session_id); // 发起呼叫
                    break;
                case "offer":
                    addVideoElement(data.from, null, data.from);
                    handleOffer(data);
                    break;
                case "answer":
                    handleAnswer(data);
                    break;
                case "candidate":
                    handleCandidate(data);
                    break;
                case "user_left":
                    removePeer(data.session_id);
                    break;
                case "media_state":
                    syncRemoteMediaUI(data.from, data.mediaType, data.enabled);
                    break;
            }
        };
    }

    // ================== 2. 房间操作 ==================
    function createRoom() {
        const room = document.getElementById('roomId').value.trim();
        if (room) sendJson({ type: "create_room", room: room });
    }

    function joinRoom() {
        const room = document.getElementById('roomId').value.trim();
        if (room) sendJson({ type: "join", room: room });
    }

    function leaveRoom() {
        sendJson({ type: "leave", room: currentRoom });
        peerConnections.forEach((pc, id) => removePeer(id));
        currentRoom = "";
        document.getElementById('btnCreate').disabled = false;
        document.getElementById('btnJoin').disabled = false;
        document.getElementById('btnLeave').disabled = true;
    }

    // ================== 3. 媒体控制 ==================
    async function toggleCamera() {
        const btn = document.getElementById('btnCamera');

        if (!isVideoEnabled) {
            try {
                // 如果之前挂着的是黑色视频轨，先清掉
                if (blackVideoTrack) {
                    localStream.removeTrack(blackVideoTrack);
                    blackVideoTrack.stop();
                    blackVideoTrack = null;
                }

                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                localStream.addTrack(track);

                isVideoEnabled = true;
                btn.innerText = "关闭摄像头"; btn.className = "btn-danger";
                document.getElementById(`mask-${myId}`).style.display = "none";

                replaceVideoTrackForPeers(track);
                broadcastMediaState('video', true);
            } catch (e) {
                log("开启失败: " + e, "red");
            }
        } else {
            const cameraTrack = localStream.getVideoTracks()[0];
            if (cameraTrack) {
                cameraTrack.stop();
                localStream.removeTrack(cameraTrack);
            }

            // 关摄像头后，不是直接断流，而是换成黑色视频轨，远端就不会停在最后一帧
            blackVideoTrack = createBlackVideoTrack();
            localStream.addTrack(blackVideoTrack);
            replaceVideoTrackForPeers(blackVideoTrack);

            isVideoEnabled = false;
            btn.innerText = "开启摄像头"; btn.className = "btn-success";
            document.getElementById(`mask-${myId}`).style.display = "flex";
            broadcastMediaState('video', false);
        }
    }

    async function toggleMic() {
    const btn = document.getElementById('btnMic');

    if (!isAudioEnabled) {
        try {
            let track = localStream.getAudioTracks()[0];

            // ✅ 如果之前没有音频轨，才创建
            if (!track) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                track = stream.getAudioTracks()[0];
                localStream.addTrack(track);

                // 🔥 关键：只在“没有 sender”时 add
                peerConnections.forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'audio');
                    if (!sender) {
                        pc.addTrack(track, localStream);
                    } else {
                        sender.replaceTrack(track);
                    }
                });
            }

            // ✅ 只打开，不重建
            track.enabled = true;

            isAudioEnabled = true;
            btn.innerText = "关闭麦克风";
            btn.className = "btn-danger";

            broadcastMediaState('audio', true);

        } catch (e) {
            log("开启失败: " + e, "red");
        }

    } else {
        const track = localStream.getAudioTracks()[0];

        // ❗关键：不要 stop，不要 remove
        if (track) {
            track.enabled = false;
        }

        isAudioEnabled = false;
        btn.innerText = "开启麦克风";
        btn.className = "btn-success";

        broadcastMediaState('audio', false);
    }
    }

    function broadcastMediaState(type, enabled) {
        peerConnections.forEach((pc, peerId) => {
            sendJson({ type: "media_state", to: peerId, from: myId, mediaType: type, enabled: enabled });
        });
    }

    function createBlackVideoTrack() {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 360;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const stream = canvas.captureStream(5);
        return stream.getVideoTracks()[0];
    }

    function replaceVideoTrackForPeers(track) {
        peerConnections.forEach(pc => {
            const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
            if (sender) {
                sender.replaceTrack(track);
            } else if (track) {
                pc.addTrack(track, localStream);
            }
        });
    }

    function syncRemoteMediaUI(peerId, type, enabled) {
        // 远端关闭摄像头时，直接展示黑画面，不再盖遮罩层。
        if (type === 'video') return;
    }

    // ================== 4. WebRTC 核心 ==================
    function createPC(peerId) {
        if (peerConnections.has(peerId)) return peerConnections.get(peerId);

        const pc = new RTCPeerConnection(rtcConfig);
        peerConnections.set(peerId, pc);

        pc.onnegotiationneeded = async () => {
            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendJson({ type: "offer", to: peerId, from: myId, sdp: offer.sdp });
            } catch (e) { log("协商失败"); }
        };

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        pc.onicecandidate = (e) => {
            if (e.candidate) sendJson({ type: "candidate", to: peerId, from: myId, candidate: e.candidate });
        };

        pc.ontrack = (e) => {
            const video = document.getElementById(`video-${peerId}`);
            if (video) video.srcObject = e.streams[0];
            const mask = document.getElementById(`mask-${peerId}`);
            if (mask && peerId === myId) mask.style.display = "none";
        };

        return pc;
    }

    // 【重要修复】发起呼叫时，强制执行一次协商，确保对方能收到 Offer 从而创建 UI
    async function initiateCall(peerId) {
        const pc = createPC(peerId);
        try {
            // 显式创建 Offer，即使没有轨道也能触发对方的 addVideoElement
            const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
            await pc.setLocalDescription(offer);
            sendJson({ type: "offer", to: peerId, from: myId, sdp: offer.sdp });
            // 同时告知新用户我当前的媒体状态
            sendJson({ type: "media_state", to: peerId, from: myId, mediaType: 'video', enabled: isVideoEnabled });
        } catch (e) { log("发起呼叫失败"); }
    }

    async function handleOffer(data) {
        const pc = createPC(data.from);
        await pc.setRemoteDescription(new RTCSessionDescription(data));
        const candidates = pendingCandidates.get(data.from) || [];
        while(candidates.length > 0) await pc.addIceCandidate(new RTCIceCandidate(candidates.shift()));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        sendJson({ type: "answer", to: data.from, from: myId, sdp: answer.sdp });
        // 回应 Offer 时也告知对方我的媒体状态
        sendJson({ type: "media_state", to: data.from, from: myId, mediaType: 'video', enabled: isVideoEnabled });
    }

    async function handleAnswer(data) {
        const pc = peerConnections.get(data.from);
        if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data));
    }

    async function handleCandidate(data) {
        const pc = peerConnections.get(data.from);
        if (pc && pc.remoteDescription) {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        } else {
            if (!pendingCandidates.has(data.from)) pendingCandidates.set(data.from, []);
            pendingCandidates.get(data.from).push(data.candidate);
        }
    }

    // ================== UI 辅助 ==================
    function addVideoElement(id, stream, labelText) {
        if (document.getElementById(`video-container-${id}`)) return;
        const grid = document.getElementById('videoGrid');
        const container = document.createElement('div');
        container.className = 'video-container';
        container.id = `video-container-${id}`;

        const isMe = (id === myId);
        const mask = document.createElement('div');
        mask.className = 'video-mask';
        mask.id = `mask-${id}`;
        
        // 【修复】修正自己的遮罩文案
        const maskText = isMe ? "摄像头已关闭" : "对方关闭了视频";
        mask.innerHTML = `<div style="font-size:30px">👤</div><div style="font-size:11px;margin-top:10px">${maskText}</div>`;
        
        // 初始化显示状态：自己的视频在关闭摄像头时显示遮罩；别人的视频默认不盖住黑画面
        if (isMe && !isVideoEnabled) mask.style.display = "flex";
        if (!isMe) mask.style.display = "none";

        const video = document.createElement('video');
        video.id = `video-${id}`;
        video.autoplay = true; video.playsInline = true;
        if (stream) video.srcObject = stream;
        if (isMe) video.muted = true;

        const label = document.createElement('div');
        label.className = 'video-label';
        label.innerText = labelText + (isMe ? " (我)" : "");

        container.appendChild(mask);
        container.appendChild(video);
        container.appendChild(label);
        grid.appendChild(container);
    }

    function removePeer(peerId) {
        const pc = peerConnections.get(peerId);
        if (pc) { pc.close(); peerConnections.delete(peerId); }
        const el = document.getElementById(`video-container-${peerId}`);
        if (el) el.remove();
        pendingCandidates.delete(peerId);
    }
</script>
</body>
</html>
